<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Void — Voice Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #16161f;
    --border: rgba(255,255,255,0.06);
    --border-bright: rgba(255,255,255,0.14);
    --accent: #7c6af7;
    --accent2: #4fc8a8;
    --accent3: #f76a8a;
    --text: #e8e8f0;
    --muted: #5a5a72;
    --muted2: #3a3a50;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); 
    color: var(--text);
    min-height: 100vh;
    display: flex; 
    align-items: center; 
    justify-content: center;
    overflow: hidden; 
    position: relative;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 15% 50%, rgba(124,106,247,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 500px 300px at 85% 20%, rgba(79,200,168,0.05) 0%, transparent 70%),
      radial-gradient(ellipse 400px 500px at 70% 85%, rgba(247,106,138,0.04) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: ''; position: fixed; inset: 0; opacity: 0.02;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px; pointer-events: none; z-index: 1;
  }

  .app { position: relative; z-index: 2; width: 460px; max-width: calc(100vw - 24px); }

  .wordmark {
    display: flex; align-items: baseline; gap: 10px;
    margin-bottom: 28px; padding: 0 4px; position: relative;
    animation: fadeUp 0.3s ease;
  }
  .wordmark-text { font-weight: 800; font-size: 28px; letter-spacing: -1px; color: #fff; }
  .wordmark-tag {
    font-family: 'Space Mono', monospace; font-size: 11px;
    color: var(--accent); letter-spacing: 2px; text-transform: uppercase;
    padding: 2px 8px; border: 1px solid rgba(124,106,247,0.3); border-radius: 2px;
  }
  .settings-icon-btn {
    margin-left: auto; background: transparent; border: none;
    color: var(--muted); font-size: 18px; cursor: pointer;
    padding: 4px 8px; border-radius: 6px; transition: all 0.15s;
  }
  .settings-icon-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden; position: relative;
    animation: fadeUp 0.4s ease;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(124,106,247,0.5), transparent);
  }

  .panel { padding: 22px 24px; }
  .panel + .panel { border-top: 1px solid var(--border); }

  .panel-label {
    font-family: 'Space Mono', monospace; font-size: 10px;
    letter-spacing: 3px; text-transform: uppercase; color: var(--muted);
    margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
  }
  .panel-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  
  .expand-btn {
    background: transparent; border: none; color: var(--muted2);
    font-size: 14px; cursor: pointer; padding: 2px 6px;
    border-radius: 4px; transition: all 0.15s; margin-left: auto;
    order: 2;
  }
  .expand-btn:hover { background: rgba(255,255,255,0.03); color: var(--muted); }
  .expand-btn:active { transform: scale(0.9); }

  .field { margin-bottom: 14px; }
  .field-label {
    font-family: 'Space Mono', monospace; font-size: 10px;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 7px; display: block;
  }
  .input-wrap { position: relative; }
  .input-prefix {
    position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
    font-family: 'Space Mono', monospace; font-size: 13px;
    color: var(--muted); pointer-events: none; transition: color 0.2s;
  }
  .input-wrap:focus-within .input-prefix { color: var(--accent); }

  input[type="text"] {
    width: 100%; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 11px 14px 11px 30px;
    color: var(--text); font-family: 'Space Mono', monospace;
    font-size: 13px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="text"]::placeholder { color: var(--muted); }
  input[type="text"]:focus {
    border-color: rgba(124,106,247,0.45);
    box-shadow: 0 0 0 3px rgba(124,106,247,0.08);
  }

  .join-row { display: flex; gap: 8px; }
  .join-row .input-wrap { flex: 1; }

  .divider {
    display: flex; align-items: center; gap: 12px; margin: 16px 0;
    font-family: 'Space Mono', monospace; font-size: 10px;
    color: var(--muted); letter-spacing: 2px;
  }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .btn {
    font-family: 'Syne', sans-serif; font-weight: 600; font-size: 13px;
    padding: 11px 18px; border-radius: 8px; border: none;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:active { transform: scale(0.97); }
  .btn-accent {
    background: var(--accent); color: #fff;
    box-shadow: 0 4px 16px rgba(124,106,247,0.28);
    width: 100%; justify-content: center;
  }
  .btn-accent:hover { background: #8d7ef8; box-shadow: 0 4px 20px rgba(124,106,247,0.42); }
  .btn-ghost {
    background: var(--surface2); color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--border-bright); color: var(--text); }

  .log-line {
    font-family: 'Space Mono', monospace; font-size: 11px;
    color: var(--muted); text-align: center; min-height: 18px; margin-top: 12px;
  }
  .log-line.err { color: var(--accent3); }
  .log-line.ok { color: var(--accent2); }

  /* ===== CALL VIEW ===== */
  .idle-view { display: block; }
  .call-view { display: none !important; }
  body.in-call .idle-view { display: none !important; }
  body.in-call .call-view { display: block !important; }

  .participants { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .participants.expanded { max-height: 400px; overflow-y: auto; }
  .participants.expanded::-webkit-scrollbar { width: 3px; }
  .participants.expanded::-webkit-scrollbar-thumb { background: var(--muted2); border-radius: 2px; }
  .participant {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 10px; transition: border-color 0.3s;
  }
  .participant.connected { border-color: rgba(79,200,168,0.2); }

  .avatar {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; font-family: 'Space Mono', monospace;
    flex-shrink: 0; position: relative;
  }
  .avatar.you { background: rgba(124,106,247,0.18); color: var(--accent); border: 1px solid rgba(124,106,247,0.3); }
  .avatar.friend-av { background: rgba(79,200,168,0.12); color: var(--accent2); border: 1px solid rgba(79,200,168,0.3); }
  .avatar.waiting-av { background: transparent; color: var(--muted2); border: 1px dashed var(--muted2); font-size: 14px; }
  .avatar-ring { position: absolute; inset: -3px; border-radius: 50%; border: 1.5px solid transparent; }
  .you .avatar-ring { border-color: rgba(124,106,247,0.3); }
  .friend-av .avatar-ring { border-color: rgba(79,200,168,0.3); animation: spin 4s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .participant-info { flex: 1; min-width: 0; }
  .participant-name { font-weight: 600; font-size: 13px; line-height: 1; margin-bottom: 3px; }
  .participant-sub { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); }
  .participant-sub.live { color: var(--accent2); }
  .participant-sub.wait { color: var(--muted2); }

  .visualizer { display: flex; align-items: center; gap: 3px; height: 26px; flex-shrink: 0; }
  .bar { width: 3px; border-radius: 2px; background: var(--accent); opacity: 0.6; animation: wave 1.2s ease-in-out infinite; }
  .bar:nth-child(1){height:8px;animation-delay:0s}
  .bar:nth-child(2){height:18px;animation-delay:.12s}
  .bar:nth-child(3){height:26px;animation-delay:.22s}
  .bar:nth-child(4){height:14px;animation-delay:.32s}
  .bar:nth-child(5){height:20px;animation-delay:.08s}
  .bar.muted { animation: none; height: 3px !important; opacity: 0.35; background: var(--accent3); }
  .bar.fb { background: var(--accent2); }
  @keyframes wave { 0%,100%{transform:scaleY(0.3);opacity:0.3} 50%{transform:scaleY(1);opacity:0.75} }

  .invite-box {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px; margin-bottom: 16px;
  }
  .invite-label {
    font-family: 'Space Mono', monospace; font-size: 10px;
    letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
  }
  .invite-row { display: flex; gap: 8px; }
  .invite-url {
    flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 7px 10px; color: var(--accent);
    font-family: 'Space Mono', monospace; font-size: 11px;
    outline: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .btn-copy {
    font-family: 'Space Mono', monospace; font-size: 11px; padding: 7px 12px;
    background: rgba(124,106,247,0.1); color: var(--accent);
    border: 1px solid rgba(124,106,247,0.2); border-radius: 6px;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .btn-copy:hover { background: rgba(124,106,247,0.22); }

  .controls { display: flex; gap: 8px; align-items: center; }
  .ctrl-btn {
    width: 40px; height: 40px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s; font-size: 15px; flex-shrink: 0;
  }
  .ctrl-btn:hover { border-color: var(--border-bright); background: rgba(255,255,255,0.03); }
  .ctrl-btn:active { transform: scale(0.95); }
  .ctrl-btn.muted-on { background: rgba(247,106,138,0.12); border-color: rgba(247,106,138,0.3); }
  .ctrl-hangup { background: rgba(247,106,138,0.1); border-color: rgba(247,106,138,0.2); }
  .ctrl-hangup:hover { background: rgba(247,106,138,0.28); border-color: rgba(247,106,138,0.5); }
  .ctrl-info {
    flex: 1; text-align: center;
    font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted);
  }
  .ctrl-info span { color: var(--accent2); }

  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted2); flex-shrink: 0; transition: all 0.3s;
  }
  .status-dot.live { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); animation: blink 2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .kick-btn {
    width: 28px; height: 28px; border-radius: 6px;
    background: rgba(247,106,138,0.08); border: 1px solid rgba(247,106,138,0.2);
    color: var(--accent3); font-size: 14px; cursor: pointer;
    transition: all 0.15s; flex-shrink: 0; display: flex;
    align-items: center; justify-content: center; padding: 0;
  }
  .kick-btn:hover { background: rgba(247,106,138,0.2); border-color: rgba(247,106,138,0.4); }
  .kick-btn:active { transform: scale(0.92); }

  /* Chat */
  .chat-wrap { border-top: 1px solid var(--border); }
  .chat-head {
    padding: 12px 24px 0;
    font-family: 'Space Mono', monospace; font-size: 10px;
    letter-spacing: 3px; text-transform: uppercase; color: var(--muted);
    display: flex; align-items: center; gap: 8px;
  }
  .chat-head::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .chat-msgs {
    height: 190px; overflow-y: auto;
    padding: 10px 24px; display: flex; flex-direction: column; gap: 7px;
    scroll-behavior: smooth;
  }
  .chat-msgs::-webkit-scrollbar { width: 3px; }
  .chat-msgs::-webkit-scrollbar-thumb { background: var(--muted2); border-radius: 2px; }

  .msg { display: flex; gap: 9px; align-items: flex-start; animation: fadeUp 0.2s ease; }
  .msg-av {
    width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; font-family: 'Space Mono', monospace;
    flex-shrink: 0; margin-top: 1px;
  }
  .msg-av.mine { background: rgba(124,106,247,0.2); color: var(--accent); }
  .msg-av.theirs { background: rgba(79,200,168,0.15); color: var(--accent2); }
  .msg-av.sys { background: rgba(58,58,80,0.4); color: var(--muted); font-size: 11px; }
  .msg-body { flex: 1; min-width: 0; }
  .msg-nick { font-family: 'Space Mono', monospace; font-size: 10px; margin-bottom: 2px; }
  .msg-nick.mine { color: var(--accent); }
  .msg-nick.theirs { color: var(--accent2); }
  .msg-text { font-size: 13px; line-height: 1.5; color: var(--text); word-break: break-word; }
  .msg-text.sys { color: var(--muted); font-style: italic; font-size: 12px; }

  .chat-input-row {
    display: flex; gap: 8px; padding: 10px 24px 20px;
    border-top: 1px solid var(--border);
  }
  .chat-in {
    flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 13px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 13px;
    outline: none; transition: border-color 0.2s;
  }
  .chat-in:focus { border-color: rgba(124,106,247,0.4); }
  .chat-in::placeholder { color: var(--muted); }
  .send-btn {
    width: 38px; height: 38px; border-radius: 8px;
    background: var(--accent); border: none; color: #fff; font-size: 15px;
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .send-btn:hover { background: #8d7ef8; }
  .send-btn:active { transform: scale(0.94); }

  /* Auth */
  .auth-buttons { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .btn-oauth {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 10px 16px; font-size: 13px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text); cursor: pointer; transition: all 0.15s;
  }
  .btn-oauth:hover { border-color: var(--border-bright); background: rgba(255,255,255,0.05); }
  .btn-github svg { fill: #fff; }
  .btn-google svg { fill: #fff; }

  .user-profile { margin-bottom: 16px; }
  .profile-info { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--surface2); border-radius: 10px; border: 1px solid var(--border); }
  .profile-avatar { width: 40px; height: 40px; border-radius: 50%; }
  .profile-details { flex: 1; min-width: 0; }
  .profile-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .btn-logout { font-size: 11px; padding: 4px 10px; background: rgba(247,106,138,0.1); color: var(--accent3); border: 1px solid rgba(247,106,138,0.2); border-radius: 5px; cursor: pointer; transition: all 0.15s; }
  .btn-logout:hover { background: rgba(247,106,138,0.2); }

  /* Context Menu */
  .context-menu {
    position: fixed; background: var(--surface); border: 1px solid var(--border-bright);
    border-radius: 8px; padding: 4px; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    z-index: 1000; min-width: 150px;
  }
  .context-item {
    padding: 8px 12px; border-radius: 6px; cursor: pointer;
    transition: background 0.15s; display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--text);
  }
  .context-item:hover { background: rgba(255,255,255,0.05); }

  /* Modal */
  .modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 999; backdrop-filter: blur(4px);
  }
  .modal-content {
    background: var(--surface); border: 1px solid var(--border-bright);
    border-radius: 16px; width: 90%; max-width: 400px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  }
  .modal-large { max-width: 500px; }
  .modal-header {
    padding: 18px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title { font-weight: 600; font-size: 15px; }
  .modal-close {
    width: 28px; height: 28px; border-radius: 6px; border: none;
    background: rgba(247,106,138,0.1); color: var(--accent3);
    cursor: pointer; transition: all 0.15s; font-size: 14px;
  }
  .modal-close:hover { background: rgba(247,106,138,0.2); }
  .modal-body { padding: 20px; }

  .volume-slider, .setting-slider {
    width: 100%; height: 6px; border-radius: 3px;
    background: var(--surface2); outline: none;
    -webkit-appearance: none; appearance: none;
  }
  .volume-slider::-webkit-slider-thumb, .setting-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--accent); cursor: pointer;
    box-shadow: 0 2px 8px rgba(124,106,247,0.4);
  }
  .volume-slider::-moz-range-thumb, .setting-slider::-moz-range-thumb {
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--accent); cursor: pointer; border: none;
    box-shadow: 0 2px 8px rgba(124,106,247,0.4);
  }
  .volume-label, .setting-value {
    text-align: center; margin-top: 12px;
    font-family: 'Space Mono', monospace; font-size: 18px;
    color: var(--accent); font-weight: 700;
  }

  .setting-group {
    margin-bottom: 20px; padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .setting-group:last-of-type { border-bottom: none; padding-bottom: 0; }
  .setting-label {
    display: block; font-size: 13px; margin-bottom: 10px;
    color: var(--text); cursor: pointer;
  }
  .setting-label input[type="checkbox"] {
    margin-right: 8px; width: 16px; height: 16px;
    cursor: pointer; accent-color: var(--accent);
  }
  
  .setting-select {
    width: 100%; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; color: var(--text);
    font-family: 'Syne', sans-serif; font-size: 13px;
    outline: none; cursor: pointer;
    transition: border-color 0.2s;
  }
  .setting-select:hover { border-color: var(--border-bright); }
  .setting-select:focus { border-color: rgba(124,106,247,0.4); }
  
  .setting-hint {
    margin-top: 6px; font-size: 11px; color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  /* Screen Share - Discord Style */
  .screen-share-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.95);
    z-index: 1000;
    display: flex;
    flex-direction: column;
    animation: fadeIn 0.2s ease;
  }
  
  .screen-share-overlay.minimized {
    inset: auto;
    bottom: 80px;
    right: 20px;
    width: 320px;
    height: 200px;
    border-radius: 12px;
    overflow: hidden;
    border: 2px solid var(--accent);
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  
  .screen-share-overlay.minimized .screen-share-video-large {
    cursor: pointer;
  }
  
  /* Stack multiple minimized screens */
  .screen-share-overlay.minimized:nth-of-type(2) {
    right: 360px;
  }
  .screen-share-overlay.minimized:nth-of-type(3) {
    right: 700px;
  }
  
  .screen-share-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  
  .screen-share-overlay.minimized .screen-share-header {
    padding: 8px 12px;
  }
  
  .screen-share-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }
  
  .screen-share-overlay.minimized .screen-share-title {
    font-size: 12px;
  }
  
  .screen-share-controls {
    display: flex;
    gap: 8px;
  }
  
  .screen-share-btn {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    border: none;
    background: rgba(255, 255, 255, 0.05);
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .screen-share-overlay.minimized .screen-share-btn {
    width: 24px;
    height: 24px;
    font-size: 12px;
  }

/*

// Multiple PeerJS servers with fallback
const PEER_SERVERS = [
  // Public servers that may work in Russia

  { host: 'peerjs-server.herokuapp.com', port: 443, path: '/', secure: true },

  { host: '0.peerjs.com', port: 443, path: '/', secure: true },
  { host: 'peerjs-server.fly.dev', port: 443, path: '/myapp', secure: true }
];

let currentServerIndex = 0;
let serverTestResults = [];

function getPeerConfig() {
  return {
    ...PEER_SERVERS[currentServerIndex],
    config: {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun.services.mozilla.com:3478' },
        { urls: 'stun:openrelay.metered.ca:80' },
        { 
          urls: 'turn:openrelay.metered.ca:80',

        },
        {

          credential: 'openrelayproject'
        }
      ]
    },
    debug: 0
  };
}

// Test server connectivity
async function testServer(serverConfig) {
  return new Promise((resolve) => {
    const ws = new WebSocket(`${serverConfig.secure ? 'wss' : 'ws'}://${serverConfig.host}:${serverConfig.port}${serverConfig.path}peerjs?key=peerjs&id=test-${Date.now()}&token=test&version=1.5.4`);
    
    const timeout = setTimeout(() => {
      ws.close();
      resolve(false);
    }, 3000);
    
    ws.onopen = () => {
      clearTimeout(timeout);
      ws.close();
      resolve(true);
    };
    
    ws.onerror = () => {
      clearTimeout(timeout);
      resolve(false);
    };
  });
}

// Find working server
async function findWorkingServer() {
  setLog('🔍 Ищем рабочий сервер...', '');
  
  for (let i = 0; i < PEER_SERVERS.length; i++) {
    const server = PEER_SERVERS[i];
    setLog(`🔍 Проверяем ${server.host}...`, '');
    
    const works = await testServer(server);
    serverTestResults.push({ index: i, host: server.host, works });
    
    if (works) {
      currentServerIndex = i;
      setLog(`✓ Найден рабочий сервер: ${server.host}`, 'ok');
      return true;
    }
  }
  
  setLog('❌ Все серверы недоступны. Нужен VPN или свой сервер.', 'err');
  return false;
}

let myPeer = null;
let mediaConnections = {}; // { peerId: MediaConnection }

// RNNoise-like noise suppression using Web Audio API
// Simplified version that doesn't mute the microphone
async function applyRNNoiseSuppression(stream) {
  try {
    if (!audioContext) {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }
    
    const source = audioContext.createMediaStreamSource(stream);
    const destination = audioContext.createMediaStreamDestination();
    
    // High-pass filter to remove low frequency rumble
    const highpass = audioContext.createBiquadFilter();
    highpass.type = 'highpass';
    highpass.frequency.value = 85;
    highpass.Q.value = 0.7;
    
    // Low-pass to remove high frequency hiss
    const lowpass = audioContext.createBiquadFilter();
    lowpass.type = 'lowpass';
    lowpass.frequency.value = 10000;
    lowpass.Q.value = 0.7;
    
    // Compressor for consistent volume
    const compressor = audioContext.createDynamicsCompressor();
    compressor.threshold.value = -24;
    compressor.knee.value = 30;
    compressor.ratio.value = 12;
    compressor.attack.value = 0.003;
    compressor.release.value = 0.25;
    
    // Gain for sensitivity
    const gainNode = audioContext.createGain();
    gainNode.gain.value = 1.2; // Slight boost
    
    // Simple chain without aggressive gating
    source.connect(highpass);
    highpass.connect(lowpass);
    lowpass.connect(compressor);
    compressor.connect(gainNode);
    gainNode.connect(destination);
    
    // Store processor for cleanup
    krispProcessor = { source, destination, gainNode, highpass, lowpass, compressor };
    
    console.log('RNNoise applied, output stream tracks:', destination.stream.getTracks().length);
    return destination.stream;
  } catch(e) {
    console.error('RNNoise suppression error:', e);
    return stream;
  }
}

function cleanupNoiseProcessor() {
  if (krispProcessor) {
    try {
      krispProcessor.source.disconnect();
      krispProcessor.highpass.disconnect();
      krispProcessor.lowpass.disconnect();
      krispProcessor.compressor.disconnect();
      krispProcessor.gainNode.disconnect();
    } catch(e) {
      console.error('Cleanup error:', e);
    }
    krispProcessor = null;
  }
}

  const w = ['echo','nova','orbit','delta','sigma','pulse','flux','relay','vortex','zenith','prism','quasar'];

async function joinRoom() {
  myNick = $('nickInput').value.trim() || 'anon';
  const raw = $('roomInput').value.trim().toLowerCase().replace(/[^a-z0-9-_]/g,'');
  room = raw.substring(0, 24);
  if (!room) { setLog('⚠ введи название комнаты', 'err'); return; }

  setLog('— запрашиваем микрофон —');
  try {
    const constraints = {
      audio: {
        echoCancellation: audioSettings.echoCancellation,
        noiseSuppression: audioSettings.noiseSuppressionMode === 'standard',
        autoGainControl: audioSettings.autoGainControl
      }, 
      video: false 
    };
    
    // Add device ID if selected
    if (audioSettings.inputDeviceId) {
      constraints.audio.deviceId = { exact: audioSettings.inputDeviceId };
    }
    
    let stream = await navigator.mediaDevices.getUserMedia(constraints);
    console.log('Got microphone stream, tracks:', stream.getTracks().length);
    
    // Apply RNNoise if enabled
    if (audioSettings.noiseSuppressionMode === 'rnnoise') {
      console.log('Applying RNNoise...');
      stream = await applyRNNoiseSuppression(stream);
      console.log('RNNoise applied, new stream tracks:', stream.getTracks().length);
    }
    
    localStream = stream;
  } catch(e) {
    setLog('❌ нет доступа к микрофону', 'err');
    return;
  }

  // Test servers first
  const serverFound = await findWorkingServer();
  if (!serverFound) {
    return;
  }

  setLog('— подключаемся к серверу —');

  // Host peer ID = "void-ROOM" (stable, known ID)
  const hostPeerId = 'void-' + room;

  // Try to connect as host
  tryAsHost(hostPeerId);
}

function tryAsHost(hostPeerId, serverRetry = false) {
  isHost = true;
  myPeer = new Peer(hostPeerId, getPeerConfig());

  myPeer.on('open', id => {
    setLog('', 'ok');
    enterCallUI();
    sysMsg('Ты создал комнату #' + room + ' как @' + myNick);

    // Wait for incoming calls (multiple guests)
    myPeer.on('call', call => {
      const peerId = call.peer;
      call.answer(localStream);
      mediaConnections[peerId] = call;
      handleMediaConn(call, peerId);
    });

    myPeer.on('connection', conn => {
      const peerId = conn.peer;
      dataConnections[peerId] = conn;
      setupDataConn(conn, peerId);
    });
  });

  myPeer.on('error', err => {
    console.error('Peer error:', err);
    if (err.type === 'unavailable-id') {
      // Host slot taken — we are the guest
      myPeer.destroy();
      joinAsGuest(hostPeerId);
    } else if (err.type === 'network') {
      setLog('❌ Проблема с сетью. Проверь интернет.', 'err');
    } else if (err.type === 'server-error' || err.type === 'socket-error' || err.type === 'socket-closed') {
      setLog('❌ Сервер недоступен. Попробуй перезагрузить страницу.', 'err');
    } else {
      setLog('❌ Ошибка: ' + err.type, 'err');
    }
  });
}

function joinAsGuest(hostPeerId, retryCount = 0) {
  isHost = false;
  const guestId = 'void-guest-' + Math.random().toString(36).slice(2,8);
  myPeer = new Peer(guestId, getPeerConfig());

  myPeer.on('open', id => {
    setLog('— звоним хосту —');
    enterCallUI();
    sysMsg('Ты вошёл в комнату #' + room + ' как @' + myNick);

    setTimeout(() => {
      // Call host for voice
      const call = myPeer.call(hostPeerId, localStream, {
        metadata: { nick: myNick }
      });
      mediaConnections[hostPeerId] = call;
      handleMediaConn(call, hostPeerId);

      // Data channel for chat
      const conn = myPeer.connect(hostPeerId, {
        metadata: { nick: myNick },
        reliable: true
      });
      dataConnections[hostPeerId] = conn;
      setupDataConn(conn, hostPeerId);

      conn.on('open', () => {
        conn.send({ type: 'hello', nick: myNick });
      });
    }, 500);
  });

  myPeer.on('error', err => {
    console.error('Peer error:', err);
    if (err.type === 'peer-unavailable' && retryCount < 3) {
      setLog(`⚠ Хост не найден, повтор ${retryCount + 1}/3...`, 'err');
      myPeer.destroy();
      setTimeout(() => joinAsGuest(hostPeerId, retryCount + 1), 1500);
    } else if (err.type === 'peer-unavailable') {
      setLog('❌ Хост недоступен. Попробуй создать новую комнату.', 'err');
    } else if (err.type === 'network') {
      setLog('❌ Проблема с сетью. Проверь интернет.', 'err');
    } else if (err.type === 'server-error' || err.type === 'socket-error' || err.type === 'socket-closed') {
      setLog('❌ Сервер недоступен. Попробуй перезагрузить страницу.', 'err');
    } else {
      setLog('❌ Ошибка: ' + err.type, 'err');
    }
  });
}

function handleMediaConn(call, peerId) {
  call.on('stream', async remoteStream => {
    console.log('Received stream from', peerId, 'video tracks:', remoteStream.getVideoTracks().length);
    
    const nick = call.metadata?.nick || peerId.slice(0, 8);
    
    participants[peerId] = { nick, stream: remoteStream };
    
    // Create audio element for this participant
    let audio = document.getElementById('audio-' + peerId);
    if (!audio) {
      audio = document.createElement('audio');
      audio.id = 'audio-' + peerId;
      audio.autoplay = true;
      audio.playsInline = true;
      document.body.appendChild(audio);
    }
    audio.srcObject = remoteStream;
    
    // Apply saved volume
    const savedVolume = participantVolumes[peerId] || 100;
    audio.volume = savedVolume / 100;
    
    // Apply output device if selected
    if (audioSettings.outputDeviceId && typeof audio.setSinkId !== 'undefined') {
      try {
        await audio.setSinkId(audioSettings.outputDeviceId);
      } catch(e) {
        console.error('Error setting output device:', e);
      }
    }
    
    // Check if stream has video
    const videoTracks = remoteStream.getVideoTracks();
    if (videoTracks.length > 0) {
      console.log('Stream has video, showing screen share');
      showScreenShare(peerId, remoteStream, nick);
    }
    
    addParticipantToUI(peerId, nick);
    sysMsg('🔗 @' + nick + ' подключился');
  });
  
  // Listen for new tracks being added (screen share)
  call.peerConnection.addEventListener('track', (event) => {
    console.log('New track received:', event.track.kind);
    if (event.track.kind === 'video' && event.streams[0]) {
      const nick = participants[peerId]?.nick || peerId.slice(0, 8);
      showScreenShare(peerId, event.streams[0], nick);
    }
  });
  
  call.on('close', () => {
    removeParticipant(peerId);
  });
  
  call.on('error', e => {
    sysMsg('⚠ ошибка соединения: ' + e.message);
  });
}

function showScreenShare(peerId, stream, nick) {
  console.log('showScreenShare called for', peerId, 'video tracks:', stream.getVideoTracks().length);
  
  // Remove existing overlay if any
  const existingOverlay = document.getElementById('screen-overlay-' + peerId);
  if (existingOverlay) existingOverlay.remove();
  
  // Create Discord-style overlay
  const overlay = document.createElement('div');
  overlay.id = 'screen-overlay-' + peerId;
  overlay.className = 'screen-share-overlay';
  
  const header = document.createElement('div');
  header.className = 'screen-share-header';
  
  const title = document.createElement('div');
  title.className = 'screen-share-title';
  if (peerId === 'self') {
    title.innerHTML = '🖥️ Твоя демонстрация экрана';
  } else {
    const displayNick = nick || participants[peerId]?.nick || 'пользователь';
    title.innerHTML = `🖥️ Демонстрация экрана — @${displayNick}`;
  }
  
  const controls = document.createElement('div');
  controls.className = 'screen-share-controls';
  
  // Minimize/Maximize button
  const minimizeBtn = document.createElement('button');
  minimizeBtn.className = 'screen-share-btn';
  minimizeBtn.innerHTML = '−';
  minimizeBtn.title = 'Свернуть';
  minimizeBtn.onclick = () => {
    if (overlay.classList.contains('minimized')) {
      overlay.classList.remove('minimized');
      minimizeBtn.innerHTML = '−';
      minimizeBtn.title = 'Свернуть';
    } else {
      overlay.classList.add('minimized');
      minimizeBtn.innerHTML = '□';
      minimizeBtn.title = 'Развернуть';
    }
  };
  
  // Close button
  const closeBtn = document.createElement('button');
  closeBtn.className = 'screen-share-btn screen-share-close';
  closeBtn.textContent = '✕';
  closeBtn.title = 'Закрыть';
  closeBtn.onclick = () => {
    overlay.remove();
    if (peerId === 'self') {
      stopScreenShare();
    }
  };
  
  controls.appendChild(minimizeBtn);
  controls.appendChild(closeBtn);
  
  header.appendChild(title);
  header.appendChild(controls);
  
  const video = document.createElement('video');
  video.id = 'screen-' + peerId;
  video.autoplay = true;
  video.playsInline = true;
  video.muted = true;
  video.className = 'screen-share-video-large';
  video.srcObject = stream;
  
  // Click on minimized video to maximize
  video.onclick = () => {
    if (overlay.classList.contains('minimized')) {
      overlay.classList.remove('minimized');
      minimizeBtn.innerHTML = '−';
      minimizeBtn.title = 'Свернуть';
    }
  };
  
  overlay.appendChild(header);
  overlay.appendChild(video);
  document.body.appendChild(overlay);
  
  console.log('Screen share overlay created');
  
  if (peerId !== 'self') {
    sysMsg('🖥️ @' + (nick || participants[peerId]?.nick || 'пользователь') + ' показывает экран');
  }
}

function setupDataConn(conn, peerId) {
  conn.on('open', () => {
    if (isHost) {
      conn.send({ type: 'hello', nick: myNick });
    }
  });
  
  conn.on('data', data => {
    if (data.type === 'hello') {
      const nick = data.nick || 'друг';
      if (participants[peerId]) {
        participants[peerId].nick = nick;
        updateParticipantUI(peerId, nick);
      }
    }
    if (data.type === 'chat') {
      addMsg(data.nick || participants[peerId]?.nick || 'друг', data.text, 'theirs');
    }
    if (data.type === 'kick') {
      sysMsg('❌ Тебя кикнул хост');
      setTimeout(() => hangup(), 1000);
    }
    if (data.type === 'screen-share-start') {
      sysMsg('🖥️ @' + (data.nick || 'пользователь') + ' начал демонстрацию экрана');
    }
    if (data.type === 'screen-share-stop') {
      const video = document.getElementById('screen-' + peerId);
      if (video) video.remove();
      sysMsg('🖥️ @' + (data.nick || 'пользователь') + ' остановил демонстрацию экрана');
    }
  });
  
  conn.on('close', () => {
    removeParticipant(peerId);
  });
}

function addParticipantToUI(peerId, nick) {
  // Remove waiting message if this is first participant
  if (Object.keys(participants).length === 1) {
    $('waitingParticipant').style.display = 'none';
  }
  
  // Check if already exists
  if (document.getElementById('participant-' + peerId)) {
    updateParticipantUI(peerId, nick);
    return;
  }
  
  const container = document.querySelector('.participants');
  const el = document.createElement('div');
  el.className = 'participant connected';
  el.id = 'participant-' + peerId;
  el.innerHTML = `
    <div class="avatar friend-av">
      <div class="avatar-ring"></div>
      <span class="participant-initial">${nick.slice(0,2).toUpperCase()}</span>
    </div>
    <div class="participant-info">
      <div class="participant-name participant-nick">${esc(nick)}</div>
      <div class="participant-sub live">🔗 подключён</div>
    </div>
    <div class="visualizer">
      <div class="bar fb"></div><div class="bar fb"></div><div class="bar fb"></div>
      <div class="bar fb"></div><div class="bar fb"></div>
    </div>
    ${isHost ? '<button class="kick-btn" onclick="kickUser(\'' + peerId + '\')" title="Кикнуть">✕</button>' : ''}

function updateParticipantUI(peerId, nick) {
  const el = document.getElementById('participant-' + peerId);
  if (!el) return;
  
  el.querySelector('.participant-initial').textContent = nick.slice(0,2).toUpperCase();
  el.querySelector('.participant-nick').textContent = nick;
}

function removeParticipant(peerId) {
  const el = document.getElementById('participant-' + peerId);
  if (el) el.remove();
  
  const audio = document.getElementById('audio-' + peerId);
  if (audio) audio.remove();
  
  const overlay = document.getElementById('screen-overlay-' + peerId);
  if (overlay) overlay.remove();
  
  const nick = participants[peerId]?.nick || 'пользователь';
  delete participants[peerId];
  delete mediaConnections[peerId];
  delete dataConnections[peerId];
  
  sysMsg('@' + nick + ' отключился');
  
  // Show waiting message if no participants left
  if (Object.keys(participants).length === 0) {
    $('waitingParticipant').style.display = 'flex';
  }
}

async function toggleScreen() {
  if (!isScreenSharing) {
    try {
      screenStream = await navigator.mediaDevices.getDisplayMedia({ 
        video: { 
          cursor: 'always',
          displaySurface: 'monitor',
          width: { ideal: 1920 },
          height: { ideal: 1080 },
          frameRate: { ideal: 15, max: 30 } // Ограничим FPS для меньших лагов
        }, 
        audio: false 
      });
      
      const videoTrack = screenStream.getVideoTracks()[0];
      
      // Show preview for yourself
      showScreenShare('self', screenStream, myNick);
      
      // Add video track to existing connections without recreating them
      Object.entries(mediaConnections).forEach(([peerId, call]) => {
        try {
          // Just add the video track to existing connection
          call.peerConnection.addTrack(videoTrack, screenStream);
          console.log('Added video track to existing connection:', peerId);
        } catch(e) {
          console.error('Error adding video track:', e);
        }
      });
      
      // Send notification about screen share
      Object.values(dataConnections).forEach(conn => {
        if (conn?.open) {
          conn.send({ type: 'screen-share-start', nick: myNick });
        }
      });
      
      // Handle screen share stop
      videoTrack.onended = () => {
        stopScreenShare();
      };
      
      isScreenSharing = true;
      $('screenBtn').classList.add('muted-on');
      $('screenBtn').textContent = '🛑';
      sysMsg('🖥️ Демонстрация экрана включена');
      
    } catch(e) {
      sysMsg('⚠ Ошибка демонстрации экрана: ' + e.message);
      console.error('Screen share error:', e);
    }
  } else {
    stopScreenShare();
  }
}

function stopScreenShare() {
  // Remove self preview overlay
  const selfOverlay = document.getElementById('screen-overlay-self');
  if (selfOverlay) selfOverlay.remove();
  
  if (screenStream) {
    screenStream.getTracks().forEach(t => t.stop());
    
    // Remove video tracks from existing connections
    Object.values(mediaConnections).forEach(call => {
      try {
        const senders = call.peerConnection.getSenders();
        senders.forEach(sender => {
          if (sender.track?.kind === 'video') {
            call.peerConnection.removeTrack(sender);
            console.log('Removed video track from connection');
          }
        });
      } catch(e) {
        console.error('Error removing video track:', e);
      }
    });
    
    // Send notification about screen share stop
    Object.values(dataConnections).forEach(conn => {
      if (conn?.open) {
        conn.send({ type: 'screen-share-stop', nick: myNick });
      }
    });
    
    screenStream = null;
  }
  
  isScreenSharing = false;
  $('screenBtn').classList.remove('muted-on');
  $('screenBtn').textContent = '🖥️';
  sysMsg('🖥️ Демонстрация экрана выключена');
}

function hangup() {
  // Stop screen sharing
  if (screenStream) {
    screenStream.getTracks().forEach(t => t.stop());
    screenStream = null;
    isScreenSharing = false;
  }
  
  // Clean up noise processor
  cleanupNoiseProcessor();
  
  // Close all connections
  Object.values(mediaConnections).forEach(conn => conn?.close());
  Object.values(dataConnections).forEach(conn => conn?.close());
  
  // Remove all audio elements
  Object.keys(participants).forEach(peerId => {
    const audio = document.getElementById('audio-' + peerId);
    if (audio) audio.remove();
  });
  
  myPeer?.destroy();
  localStream?.getTracks().forEach(t => t.stop());
  
  mediaConnections = {};
  dataConnections = {};
  participants = {};
  myPeer = localStream = null;
  isMuted = false;

  document.body.classList.remove('in-call');
  
  // Remove all dynamic participants
  document.querySelectorAll('.participant[id^="participant-"]').forEach(el => el.remove());
  
  $('waitingParticipant').style.display = 'flex';
  $('waitDot').classList.remove('live');
  $('micBtn').textContent = '🎙';
  $('micBtn').classList.remove('muted-on');
  $('screenBtn').textContent = '🖥️';
  $('screenBtn').classList.remove('muted-on');
  $('chatMsgs').innerHTML = '';
  
  // Clear saved session (but keep chat history)
  sessionStorage.removeItem('void_current_room');
  sessionStorage.removeItem('void_current_nick');
  sessionStorage.removeItem('void_is_host');
  // Uncomment to clear chat history on hangup:
  // if (room) sessionStorage.removeItem('void_chat_' + room);
}

function kickUser(peerId) {
  if (!isHost) return;
  
  const nick = participants[peerId]?.nick || 'пользователь';
  
  if (confirm('Кикнуть @' + nick + ' из комнаты?')) {
    const conn = dataConnections[peerId];
    if (conn?.open) {
      conn.send({ type: 'kick' });
    }
    
    mediaConnections[peerId]?.close();
    dataConnections[peerId]?.close();
    
    removeParticipant(peerId);
    sysMsg('Ты кикнул @' + nick);
  }
}

async function loadAudioDevices() {
  try {
    const devices = await navigator.mediaDevices.enumerateDevices();
    
    const inputSelect = $('inputDevice');
    const outputSelect = $('outputDevice');
    
    // Clear existing options except default
    inputSelect.innerHTML = '<option value="">По умолчанию</option>';
    outputSelect.innerHTML = '<option value="">По умолчанию</option>';
    
    devices.forEach(device => {
      const option = document.createElement('option');
      option.value = device.deviceId;
      option.textContent = device.label || `${device.kind} ${device.deviceId.slice(0, 8)}`;
      
      if (device.kind === 'audioinput') {
        inputSelect.appendChild(option);
      } else if (device.kind === 'audiooutput') {
        outputSelect.appendChild(option);
      }
    });
    
    // Set saved values
    inputSelect.value = audioSettings.inputDeviceId;
    outputSelect.value = audioSettings.outputDeviceId;
    
  } catch(e) {
    console.error('Error loading devices:', e);
  }
}

async function applyAudioSettings() {
  const oldMode = audioSettings.noiseSuppressionMode;
  
  audioSettings.noiseSuppressionMode = $('noiseSuppressionMode').value;
  audioSettings.echoCancellation = $('echoCancellation').checked;
  audioSettings.autoGainControl = $('autoGainControl').checked;
  audioSettings.sensitivity = parseInt($('sensitivitySlider').value);
  audioSettings.inputDeviceId = $('inputDevice').value;
  audioSettings.outputDeviceId = $('outputDevice').value;
  
  // Save settings to localStorage
  localStorage.setItem('void_audio_settings', JSON.stringify(audioSettings));
  
  // Reacquire media stream with new settings
  if (localStream) {
    // Clean up old processor
    if (oldMode === 'rnnoise') {
      cleanupNoiseProcessor();
    }
    
    localStream.getTracks().forEach(t => t.stop());
    
    try {
      const constraints = {
        audio: {
          echoCancellation: audioSettings.echoCancellation,
          noiseSuppression: audioSettings.noiseSuppressionMode === 'standard',
          autoGainControl: audioSettings.autoGainControl
        },
        video: false
      };
      
      // Add device ID if selected
      if (audioSettings.inputDeviceId) {
        constraints.audio.deviceId = { exact: audioSettings.inputDeviceId };
      }
      
      let stream = await navigator.mediaDevices.getUserMedia(constraints);
      
      // Apply RNNoise if enabled
      if (audioSettings.noiseSuppressionMode === 'rnnoise') {
        stream = await applyRNNoiseSuppression(stream);
      }
      
      localStream = stream;
      
      // Update all media connections with new stream
      Object.values(mediaConnections).forEach(conn => {
        const sender = conn.peerConnection.getSenders().find(s => s.track?.kind === 'audio');
        if (sender && localStream.getAudioTracks()[0]) {
          sender.replaceTrack(localStream.getAudioTracks()[0]);
        }
      });
      
      sysMsg('✓ Настройки применены');
    } catch(e) {
      sysMsg('⚠ Ошибка применения настроек: ' + e.message);
    }
  }
  
  // Apply output device to all audio elements
  if (audioSettings.outputDeviceId && typeof HTMLMediaElement.prototype.setSinkId !== 'undefined') {
    Object.keys(participants).forEach(async (peerId) => {
      const audio = document.getElementById('audio-' + peerId);
      if (audio) {
        try {
          await audio.setSinkId(audioSettings.outputDeviceId);
        } catch(e) {
          console.error('Error setting output device:', e);
        }
      }
    });
  }
  
  closeSettings();
}

// Close modals on Escape
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeVolumeModal();
    closeSettings();
  }
});
</script>
</body>
