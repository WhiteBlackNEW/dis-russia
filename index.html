<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Void — Voice Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #16161f;
    --border: rgba(255,255,255,0.06);
    --border-bright: rgba(255,255,255,0.14);
    --accent: #7c6af7;
    --accent2: #4fc8a8;
    --accent3: #f76a8a;
    --text: #e8e8f0;
    --muted: #5a5a72;
    --muted2: #3a3a50;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); 
    color: var(--text);
    min-height: 100vh;
    display: flex; 
    align-items: center; 
    justify-content: center;
    overflow: hidden; 
    position: relative;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 15% 50%, rgba(124,106,247,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 500px 300px at 85% 20%, rgba(79,200,168,0.05) 0%, transparent 70%),
      radial-gradient(ellipse 400px 500px at 70% 85%, rgba(247,106,138,0.04) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: ''; position: fixed; inset: 0; opacity: 0.02;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px; pointer-events: none; z-index: 1;
  }

  .app { position: relative; z-index: 2; width: 460px; max-width: calc(100vw - 24px); }

  .wordmark {
    display: flex; align-items: baseline; gap: 10px;
    margin-bottom: 28px; padding: 0 4px;
    animation: fadeUp 0.3s ease;
  }
  .wordmark-text { font-weight: 800; font-size: 28px; letter-spacing: -1px; color: #fff; }
  .wordmark-tag {
    font-family: 'Space Mono', monospace; font-size: 11px;
    color: var(--accent); letter-spacing: 2px; text-transform: uppercase;
    padding: 2px 8px; border: 1px solid rgba(124,106,247,0.3); border-radius: 2px;
  }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden; position: relative;
    animation: fadeUp 0.4s ease;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(124,106,247,0.5), transparent);
  }

  .panel { padding: 22px 24px; }
  .panel + .panel { border-top: 1px solid var(--border); }

  .panel-label {
    font-family: 'Space Mono', monospace; font-size: 10px;
    letter-spacing: 3px; text-transform: uppercase; color: var(--muted);
    margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
  }
  .panel-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .field { margin-bottom: 14px; }
  .field-label {
    font-family: 'Space Mono', monospace; font-size: 10px;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 7px; display: block;
  }
  .input-wrap { position: relative; }
  .input-prefix {
    position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
    font-family: 'Space Mono', monospace; font-size: 13px;
    color: var(--muted); pointer-events: none; transition: color 0.2s;
  }
  .input-wrap:focus-within .input-prefix { color: var(--accent); }

  input[type="text"] {
    width: 100%; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 11px 14px 11px 30px;
    color: var(--text); font-family: 'Space Mono', monospace;
    font-size: 13px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="text"]::placeholder { color: var(--muted); }
  input[type="text"]:focus {
    border-color: rgba(124,106,247,0.45);
    box-shadow: 0 0 0 3px rgba(124,106,247,0.08);
  }

  .join-row { display: flex; gap: 8px; }
  .join-row .input-wrap { flex: 1; }

  .divider {
    display: flex; align-items: center; gap: 12px; margin: 16px 0;
    font-family: 'Space Mono', monospace; font-size: 10px;
    color: var(--muted); letter-spacing: 2px;
  }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .btn {
    font-family: 'Syne', sans-serif; font-weight: 600; font-size: 13px;
    padding: 11px 18px; border-radius: 8px; border: none;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:active { transform: scale(0.97); }
  .btn-accent {
    background: var(--accent); color: #fff;
    box-shadow: 0 4px 16px rgba(124,106,247,0.28);
    width: 100%; justify-content: center;
  }
  .btn-accent:hover { background: #8d7ef8; box-shadow: 0 4px 20px rgba(124,106,247,0.42); }
  .btn-ghost {
    background: var(--surface2); color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--border-bright); color: var(--text); }

  .log-line {
    font-family: 'Space Mono', monospace; font-size: 11px;
    color: var(--muted); text-align: center; min-height: 18px; margin-top: 12px;
  }
  .log-line.err { color: var(--accent3); }
  .log-line.ok { color: var(--accent2); }

  /* ===== CALL VIEW ===== */
  .idle-view { display: block; }
  .call-view { display: none !important; }
  body.in-call .idle-view { display: none !important; }
  body.in-call .call-view { display: block !important; }

  .participants { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .participant {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 10px; transition: border-color 0.3s;
  }
  .participant.connected { border-color: rgba(79,200,168,0.2); }

  .avatar {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; font-family: 'Space Mono', monospace;
    flex-shrink: 0; position: relative;
  }
  .avatar.you { background: rgba(124,106,247,0.18); color: var(--accent); border: 1px solid rgba(124,106,247,0.3); }
  .avatar.friend-av { background: rgba(79,200,168,0.12); color: var(--accent2); border: 1px solid rgba(79,200,168,0.3); }
  .avatar.waiting-av { background: transparent; color: var(--muted2); border: 1px dashed var(--muted2); font-size: 14px; }
  .avatar-ring { position: absolute; inset: -3px; border-radius: 50%; border: 1.5px solid transparent; }
  .you .avatar-ring { border-color: rgba(124,106,247,0.3); }
  .friend-av .avatar-ring { border-color: rgba(79,200,168,0.3); animation: spin 4s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .participant-info { flex: 1; min-width: 0; }
  .participant-name { font-weight: 600; font-size: 13px; line-height: 1; margin-bottom: 3px; }
  .participant-sub { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); }
  .participant-sub.live { color: var(--accent2); }
  .participant-sub.wait { color: var(--muted2); }

  .visualizer { display: flex; align-items: center; gap: 3px; height: 26px; flex-shrink: 0; }
  .bar { width: 3px; border-radius: 2px; background: var(--accent); opacity: 0.6; animation: wave 1.2s ease-in-out infinite; }
  .bar:nth-child(1){height:8px;animation-delay:0s}
  .bar:nth-child(2){height:18px;animation-delay:.12s}
  .bar:nth-child(3){height:26px;animation-delay:.22s}
  .bar:nth-child(4){height:14px;animation-delay:.32s}
  .bar:nth-child(5){height:20px;animation-delay:.08s}
  .bar.muted { animation: none; height: 3px !important; opacity: 0.35; background: var(--accent3); }
  .bar.fb { background: var(--accent2); }
  @keyframes wave { 0%,100%{transform:scaleY(0.3);opacity:0.3} 50%{transform:scaleY(1);opacity:0.75} }

  .invite-box {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px; margin-bottom: 16px;
  }
  .invite-label {
    font-family: 'Space Mono', monospace; font-size: 10px;
    letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
  }
  .invite-row { display: flex; gap: 8px; }
  .invite-url {
    flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 7px 10px; color: var(--accent);
    font-family: 'Space Mono', monospace; font-size: 11px;
    outline: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .btn-copy {
    font-family: 'Space Mono', monospace; font-size: 11px; padding: 7px 12px;
    background: rgba(124,106,247,0.1); color: var(--accent);
    border: 1px solid rgba(124,106,247,0.2); border-radius: 6px;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .btn-copy:hover { background: rgba(124,106,247,0.22); }

  .controls { display: flex; gap: 8px; align-items: center; }
  .ctrl-btn {
    width: 40px; height: 40px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s; font-size: 15px; flex-shrink: 0;
  }
  .ctrl-btn:hover { border-color: var(--border-bright); background: rgba(255,255,255,0.03); }
  .ctrl-btn:active { transform: scale(0.95); }
  .ctrl-btn.muted-on { background: rgba(247,106,138,0.12); border-color: rgba(247,106,138,0.3); }
  .ctrl-hangup { background: rgba(247,106,138,0.1); border-color: rgba(247,106,138,0.2); }
  .ctrl-hangup:hover { background: rgba(247,106,138,0.28); border-color: rgba(247,106,138,0.5); }
  .ctrl-info {
    flex: 1; text-align: center;
    font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted);
  }
  .ctrl-info span { color: var(--accent2); }

  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted2); flex-shrink: 0; transition: all 0.3s;
  }
  .status-dot.live { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); animation: blink 2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Chat */
  .chat-wrap { border-top: 1px solid var(--border); }
  .chat-head {
    padding: 12px 24px 0;
    font-family: 'Space Mono', monospace; font-size: 10px;
    letter-spacing: 3px; text-transform: uppercase; color: var(--muted);
    display: flex; align-items: center; gap: 8px;
  }
  .chat-head::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .chat-msgs {
    height: 190px; overflow-y: auto;
    padding: 10px 24px; display: flex; flex-direction: column; gap: 7px;
    scroll-behavior: smooth;
  }
  .chat-msgs::-webkit-scrollbar { width: 3px; }
  .chat-msgs::-webkit-scrollbar-thumb { background: var(--muted2); border-radius: 2px; }

  .msg { display: flex; gap: 9px; align-items: flex-start; animation: fadeUp 0.2s ease; }
  .msg-av {
    width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; font-family: 'Space Mono', monospace;
    flex-shrink: 0; margin-top: 1px;
  }
  .msg-av.mine { background: rgba(124,106,247,0.2); color: var(--accent); }
  .msg-av.theirs { background: rgba(79,200,168,0.15); color: var(--accent2); }
  .msg-av.sys { background: rgba(58,58,80,0.4); color: var(--muted); font-size: 11px; }
  .msg-body { flex: 1; min-width: 0; }
  .msg-nick { font-family: 'Space Mono', monospace; font-size: 10px; margin-bottom: 2px; }
  .msg-nick.mine { color: var(--accent); }
  .msg-nick.theirs { color: var(--accent2); }
  .msg-text { font-size: 13px; line-height: 1.5; color: var(--text); word-break: break-word; }
  .msg-text.sys { color: var(--muted); font-style: italic; font-size: 12px; }

  .chat-input-row {
    display: flex; gap: 8px; padding: 10px 24px 20px;
    border-top: 1px solid var(--border);
  }
  .chat-in {
    flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    padding: 9px 13px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 13px;
    outline: none; transition: border-color 0.2s;
  }
  .chat-in:focus { border-color: rgba(124,106,247,0.4); }
  .chat-in::placeholder { color: var(--muted); }
  .send-btn {
    width: 38px; height: 38px; border-radius: 8px;
    background: var(--accent); border: none; color: #fff; font-size: 15px;
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .send-btn:hover { background: #8d7ef8; }
  .send-btn:active { transform: scale(0.94); }

  @keyframes fadeUp { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:translateY(0)} }
  audio { display: none; }
</style>
</head>
<body>
<audio id="remoteAudio" autoplay playsinline></audio>

<div class="app">
  <div class="wordmark">
    <span class="wordmark-text">void</span>
    <span class="wordmark-tag">voice</span>
  </div>

  <div class="card">

    <!-- IDLE -->
    <div class="idle-view">
      <div class="panel">
        <div class="panel-label">Профиль</div>
        <div class="field">
          <label class="field-label">Твой ник</label>
          <div class="input-wrap">
            <span class="input-prefix">@</span>
            <input type="text" id="nickInput" placeholder="anon" maxlength="20" autocomplete="off" spellcheck="false" />
          </div>
        </div>

        <div class="divider">комната</div>

        <div class="field">
          <label class="field-label">Создать новую</label>
          <button class="btn btn-accent" onclick="createRoom()">
            <span style="font-size:16px;line-height:1">+</span> Создать комнату
          </button>
        </div>

        <div class="divider">или войти</div>

        <div class="field">
          <label class="field-label">По названию</label>
          <div class="join-row">
            <div class="input-wrap">
              <span class="input-prefix">#</span>
              <input type="text" id="roomInput" placeholder="название-комнаты" autocomplete="off" spellcheck="false" />
            </div>
            <button class="btn btn-ghost" onclick="joinRoom()">Войти</button>
          </div>
        </div>

        <div class="log-line" id="log"></div>
      </div>
    </div>

    <!-- CALL -->
    <div class="call-view">
      <div class="panel">
        <div class="panel-label">Участники</div>
        <div class="participants">

          <div class="participant">
            <div class="avatar you">
              <div class="avatar-ring"></div>
              <span id="yourInitial">ТЫ</span>
            </div>
            <div class="participant-info">
              <div class="participant-name" id="yourNickDisp">Ты</div>
              <div class="participant-sub live" id="youSub">🎙 в эфире</div>
            </div>
            <div class="visualizer" id="myViz">
              <div class="bar"></div><div class="bar"></div><div class="bar"></div>
              <div class="bar"></div><div class="bar"></div>
            </div>
          </div>

          <div class="participant connected" id="friendParticipant" style="display:none">
            <div class="avatar friend-av">
              <div class="avatar-ring"></div>
              <span id="friendInitial">👤</span>
            </div>
            <div class="participant-info">
              <div class="participant-name" id="friendNickDisp">Друг</div>
              <div class="participant-sub live">🔗 подключён</div>
            </div>
            <div class="visualizer">
              <div class="bar fb"></div><div class="bar fb"></div><div class="bar fb"></div>
              <div class="bar fb"></div><div class="bar fb"></div>
            </div>
          </div>

          <div class="participant" id="waitingParticipant">
            <div class="avatar waiting-av">···</div>
            <div class="participant-info">
              <div class="participant-name" style="color:var(--muted)">Ждём друга...</div>
              <div class="participant-sub wait">скинь ссылку</div>
            </div>
            <div class="status-dot" id="waitDot"></div>
          </div>

        </div>

        <div class="invite-box">
          <div class="invite-label">Ссылка-приглашение</div>
          <div class="invite-row">
            <input class="invite-url" id="inviteUrl" readonly />
            <button class="btn-copy" id="copyBtn" onclick="copyLink()">COPY</button>
          </div>
        </div>

        <div class="controls">
          <button class="ctrl-btn" id="micBtn" onclick="toggleMic()" title="Микрофон">🎙</button>
          <div class="ctrl-info">канал <span id="currentRoom"></span></div>
          <button class="ctrl-btn ctrl-hangup" onclick="hangup()" title="Выйти">📵</button>
        </div>
      </div>

      <div class="chat-wrap">
        <div class="chat-head">Чат</div>
        <div class="chat-msgs" id="chatMsgs"></div>
        <div class="chat-input-row">
          <input class="chat-in" id="chatIn" placeholder="Написать сообщение..." maxlength="300" autocomplete="off" spellcheck="false" />
          <button class="send-btn" onclick="sendChat()">↑</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
/*
  Архитектура:
  - Каждый пользователь регистрируется в PeerJS как "room__nick__randomid"
  - Хост (создатель) регистрируется как "void-HOST-roomname"
  - Гость ищет хоста по этому ID и звонит ему
  - Голос: через PeerJS MediaConnection
  - Чат: через PeerJS DataConnection
*/

const PEER_CONFIG = {
  host: '0.peerjs.com',
  port: 443,
  path: '/',
  secure: true,
  config: {
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
    ]
  }
};

let myPeer = null;
let mediaConn = null;
let dataConn = null;
let localStream = null;
let isMuted = false;
let myNick = 'anon';
let friendNick = 'друг';
let room = '';
let isHost = false;

// UI helpers
const $ = id => document.getElementById(id);
function setLog(msg, cls='') {
  const el = $('log');
  el.textContent = msg;
  el.className = 'log-line ' + cls;
}
function sysMsg(text) {
  addMsg(null, text, 'sys');
}
function addMsg(nick, text, side) {
  const box = $('chatMsgs');
  const el = document.createElement('div');
  el.className = 'msg';
  if (side === 'sys') {
    el.innerHTML = `<div class="msg-av sys">—</div>
      <div class="msg-body"><div class="msg-text sys">${esc(text)}</div></div>`;
  } else {
    const initials = (nick||'?').slice(0,2).toUpperCase();
    el.innerHTML = `<div class="msg-av ${side}">${initials}</div>
      <div class="msg-body">
        <div class="msg-nick ${side}">@${esc(nick)}</div>
        <div class="msg-text">${esc(text)}</div>
      </div>`;
  }
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Enter keys
$('roomInput').addEventListener('keydown', e => { if (e.key==='Enter') joinRoom(); });
$('chatIn').addEventListener('keydown', e => { if (e.key==='Enter') sendChat(); });

function randRoom() {
  const w = ['echo','nova','orbit','delta','sigma','pulse','flux','relay','vortex','zenith','prism','quasar'];
  return w[Math.floor(Math.random()*w.length)] + '-' + Math.floor(100+Math.random()*900);
}

function createRoom() {
  $('roomInput').value = randRoom();
  joinRoom();
}

async function joinRoom() {
  myNick = $('nickInput').value.trim() || 'anon';
  const raw = $('roomInput').value.trim().toLowerCase().replace(/[^a-z0-9-_]/g,'');
  room = raw.substring(0, 24);
  if (!room) { setLog('⚠ введи название комнаты', 'err'); return; }

  setLog('— запрашиваем микрофон —');
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch(e) {
    setLog('❌ нет доступа к микрофону', 'err');
    return;
  }

  setLog('— подключаемся к серверу —');

  // Host peer ID = "void-ROOM" (stable, known ID)
  // We try to claim it first; if taken, we are the guest
  const hostPeerId = 'void-' + room;

  // Try to connect as host
  tryAsHost(hostPeerId);
}

function tryAsHost(hostPeerId) {
  isHost = true;
  myPeer = new Peer(hostPeerId, PEER_CONFIG);

  myPeer.on('open', id => {
    // We got the host ID — we are the host
    setLog('', 'ok');
    enterCallUI();
    sysMsg('Ты создал комнату #' + room + ' как @' + myNick);

    // Wait for incoming calls
    myPeer.on('call', call => {
      call.answer(localStream);
      mediaConn = call;
      handleMediaConn(call);
    });

    myPeer.on('connection', conn => {
      dataConn = conn;
      setupDataConn(conn);
    });
  });

  myPeer.on('error', err => {
    if (err.type === 'unavailable-id') {
      // Host slot taken — we are the guest
      myPeer.destroy();
      joinAsGuest(hostPeerId);
    } else {
      setLog('❌ Ошибка: ' + err.message, 'err');
    }
  });
}

function joinAsGuest(hostPeerId, retryCount = 0) {
  isHost = false;
  // Guest gets random peer ID
  const guestId = 'void-guest-' + Math.random().toString(36).slice(2,8);
  myPeer = new Peer(guestId, PEER_CONFIG);

  myPeer.on('open', id => {
    setLog('— звоним хосту —');
    enterCallUI();
    sysMsg('Ты вошёл в комнату #' + room + ' как @' + myNick);

    // Small delay to ensure host is ready
    setTimeout(() => {
      // Call host for voice
      const call = myPeer.call(hostPeerId, localStream, {
        metadata: { nick: myNick }
      });
      mediaConn = call;
      handleMediaConn(call);

      // Data channel for chat
      const conn = myPeer.connect(hostPeerId, {
        metadata: { nick: myNick },
        reliable: true
      });
      dataConn = conn;
      setupDataConn(conn);

      conn.on('open', () => {
        conn.send({ type: 'hello', nick: myNick });
      });
    }, 500);
  });

  myPeer.on('error', err => {
    if (err.type === 'peer-unavailable' && retryCount < 3) {
      setLog(`⚠ Хост не найден, повтор ${retryCount + 1}/3...`, 'err');
      myPeer.destroy();
      // Retry as guest after delay
      setTimeout(() => joinAsGuest(hostPeerId, retryCount + 1), 1500);
    } else if (err.type === 'peer-unavailable') {
      setLog('❌ Хост недоступен. Попробуй создать новую комнату.', 'err');
    } else {
      setLog('❌ ' + err.message, 'err');
    }
  });
}

function handleMediaConn(call) {
  call.on('stream', remoteStream => {
    $('remoteAudio').srcObject = remoteStream;
    showFriend(call.metadata?.nick || call.peer);
    sysMsg('🔗 голосовая связь установлена');
  });
  call.on('close', () => {
    friendDisconnected();
  });
  call.on('error', e => {
    sysMsg('⚠ ошибка соединения: ' + e.message);
  });
}

function setupDataConn(conn) {
  conn.on('open', () => {
    // host side: greet back
    if (isHost) {
      conn.send({ type: 'hello', nick: myNick });
    }
  });
  conn.on('data', data => {
    if (data.type === 'hello') {
      friendNick = data.nick || 'друг';
      showFriend(friendNick);
    }
    if (data.type === 'chat') {
      addMsg(data.nick || friendNick, data.text, 'theirs');
    }
  });
  conn.on('close', () => friendDisconnected());
}

function showFriend(nick) {
  if (nick && nick !== friendNick) {
    friendNick = nick;
  }
  $('friendNickDisp').textContent = friendNick;
  $('friendInitial').textContent = friendNick.slice(0,2).toUpperCase();
  $('friendParticipant').style.display = 'flex';
  $('waitingParticipant').style.display = 'none';
  $('waitDot').classList.remove('live');
}

function friendDisconnected() {
  $('friendParticipant').style.display = 'none';
  $('waitingParticipant').style.display = 'flex';
  $('waitDot').classList.add('live');
  $('remoteAudio').srcObject = null;
  sysMsg('@' + friendNick + ' отключился');
}

function enterCallUI() {
  document.body.classList.add('in-call');
  $('currentRoom').textContent = room;
  $('yourNickDisp').textContent = myNick;
  $('yourInitial').textContent = myNick.slice(0,2).toUpperCase();
  $('waitDot').classList.add('live');

  const url = location.href.split('#')[0] + '#' + encodeURIComponent(room);
  $('inviteUrl').value = url;
}

function toggleMic() {
  isMuted = !isMuted;
  localStream?.getAudioTracks().forEach(t => t.enabled = !isMuted);
  const btn = $('micBtn');
  btn.textContent = isMuted ? '🔇' : '🎙';
  btn.classList.toggle('muted-on', isMuted);
  $('youSub').textContent = isMuted ? '🔇 заглушен' : '🎙 в эфире';
  document.querySelectorAll('#myViz .bar').forEach(b => b.classList.toggle('muted', isMuted));
}

function hangup() {
  mediaConn?.close();
  dataConn?.close();
  myPeer?.destroy();
  localStream?.getTracks().forEach(t => t.stop());
  mediaConn = dataConn = myPeer = localStream = null;
  isMuted = false;

  document.body.classList.remove('in-call');
  $('friendParticipant').style.display = 'none';
  $('waitingParticipant').style.display = 'flex';
  $('waitDot').classList.remove('live');
  $('micBtn').textContent = '🎙';
  $('micBtn').classList.remove('muted-on');
  $('chatMsgs').innerHTML = '';
  $('remoteAudio').srcObject = null;
}

function copyLink() {
  navigator.clipboard.writeText($('inviteUrl').value).then(() => {
    const b = $('copyBtn');
    b.textContent = 'COPIED';
    setTimeout(() => b.textContent = 'COPY', 2000);
  });
}

function sendChat() {
  const inp = $('chatIn');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  addMsg(myNick, text, 'mine');
  if (dataConn?.open) {
    dataConn.send({ type: 'chat', nick: myNick, text });
  }
}

// Auto-join from URL hash
window.addEventListener('load', () => {
  const hash = decodeURIComponent(location.hash.slice(1));
  if (hash) $('roomInput').value = hash;
});
</script>
</body>
</html>
